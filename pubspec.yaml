name: openfxpedia
description: OpenFXpedia — cross-platform (Windows + Android) currency converter and encyclopedia.
publish_to: none
version: 1.0.0
environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  http: ^1.2.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.0
  provider: ^6.1.0
  flutter_svg: ^2.0.0
  intl: ^0.20.2
  package_info_plus: ^4.0.0
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - LICENSE
    - assets/icons/
    - assets/data/fiat_currencies.json

flutter_launcher_icons:
  image_path: assets/branding/openfxpedia_logo.png
  android: true
  ios: false
  min_sdk_android: 21
  windows:
    generate: true
    image_path: assets/branding/openfxpedia_logo.png
    icon_size: 256
